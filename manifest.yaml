version: 6.54.6

type: DeclarativeSource

description: >-
  Custom Airbyte connector for GitHub organization data via GraphQL API.
  Streams: repo_details (incremental), releases_details (full_refresh),
  team_repositories (full_refresh, grouped by team via custom Python stream).

check:
  type: CheckStream
  stream_names:
    - repo_details

definitions:
  base_requester:
    type: HttpRequester
    url_base: https://api.github.com
    path: /graphql
    http_method: POST
    request_headers:
      Content-Type: application/json
    authenticator:
      type: BearerAuthenticator
      api_token: "{{ config['access_token'] }}"

  streams:
    repo_details:
      type: DeclarativeStream
      name: repo_details
      primary_key:
        - id
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          request_body_json:
            query: >-
              query($orgName: String!, $after: String) {
                organization(login: $orgName) {
                  repositories(first: 100, after: $after) {
                    nodes {
                      id name nameWithOwner url homepageUrl sshUrl
                      createdAt updatedAt pushedAt description
                      isPrivate isFork isArchived
                      primaryLanguage { name }
                      latestRelease { name tagName publishedAt }
                      languages(first: 100) { edges { size node { name } } }
                      readme: object(expression: "HEAD:README.md") { ... on Blob { text byteSize isBinary } }
                      codeowners: object(expression: "HEAD:CODEOWNERS") { ... on Blob { text byteSize isBinary } }
                    }
                    pageInfo { hasNextPage endCursor }
                  }
                }
              }
            variables:
              orgName: "{{ config['org_name'] }}"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - data
              - organization
              - repositories
              - nodes
        paginator:
          type: DefaultPaginator
          page_token_option:
            type: RequestOption
            inject_into: body_json
            field_name: variables
          pagination_strategy:
            type: CursorPagination
            cursor_value: >-
              {{ '{"orgName": "' + config['org_name'] + '", "after": "' +
              response.data.organization.repositories.pageInfo.endCursor + '"}'
              if response.data.organization.repositories.pageInfo.endCursor else "" }}
            stop_condition: >-
              {{ response.data.organization.repositories.pageInfo.hasNextPage is false }}
        decoder:
          type: JsonDecoder
      incremental_sync:
        type: DatetimeBasedCursor
        cursor_field: updatedAt
        cursor_datetime_formats:
          - "%Y-%m-%dT%H:%M:%SZ"
        datetime_format: "%Y-%m-%dT%H:%M:%SZ"
        start_datetime:
          type: MinMaxDatetime
          datetime: "{{ config.get('start_date', '1970-01-01T00:00:00Z') }}"
          datetime_format: "%Y-%m-%dT%H:%M:%SZ"
        is_client_side_incremental: true
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/repo_details"

    releases_details:
      type: DeclarativeStream
      name: releases_details
      primary_key:
        - id
      retriever:
        type: SimpleRetriever
        requester:
          $ref: "#/definitions/base_requester"
          request_body_json:
            query: >-
              query($orgName: String!, $after: String) {
                organization(login: $orgName) {
                  repositories(first: 100, after: $after) {
                    nodes {
                      id name
                      releases(first: 10, orderBy: {field: CREATED_AT, direction: DESC}) {
                        nodes { name tagName isPrerelease isDraft publishedAt description url }
                      }
                    }
                    pageInfo { hasNextPage endCursor }
                  }
                }
              }
            variables:
              orgName: "{{ config['org_name'] }}"
        record_selector:
          type: RecordSelector
          extractor:
            type: DpathExtractor
            field_path:
              - data
              - organization
              - repositories
              - nodes
          record_filter:
            type: RecordFilter
            condition: >-
              {{ (record.releases.nodes | length > 0) and
              (((record.releases.nodes | selectattr('publishedAt') | map(attribute='publishedAt') | list | max) >= config.get('start_date', '1970-01-01T00:00:00Z'))
              if (record.releases.nodes | selectattr('publishedAt') | list | length > 0) else false) }}
        paginator:
          type: DefaultPaginator
          page_token_option:
            type: RequestOption
            inject_into: body_json
            field_name: variables
          pagination_strategy:
            type: CursorPagination
            cursor_value: >-
              {{ '{"orgName": "' + config['org_name'] + '", "after": "' +
              response.data.organization.repositories.pageInfo.endCursor + '"}'
              if response.data.organization.repositories.pageInfo.endCursor else "" }}
            stop_condition: >-
              {{ response.data.organization.repositories.pageInfo.hasNextPage is false }}
        decoder:
          type: JsonDecoder
      transformations:
        - type: AddFields
          fields:
            - type: AddedFieldDefinition
              path:
                - releases
              value: "{{ record.releases.nodes }}"
        - type: RemoveFields
          field_pointers:
            - - releases
              - nodes
      schema_loader:
        type: InlineSchemaLoader
        schema:
          $ref: "#/schemas/releases_details"

streams:
  - $ref: "#/definitions/streams/repo_details"
  - $ref: "#/definitions/streams/releases_details"

spec:
  type: Spec
  connection_specification:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    required:
      - access_token
      - org_name
    properties:
      access_token:
        type: string
        title: GitHub Personal Access Token
        description: >-
          A GitHub PAT with read:org, repo, and read:packages scopes.
        order: 0
        airbyte_secret: true
      org_name:
        type: string
        title: GitHub Organization Name
        description: The login name of the GitHub organization to fetch data from.
        order: 1
      start_date:
        type: string
        title: Start Date
        description: >-
          Only include data on or after this date (ISO 8601, e.g. 2025-01-01T00:00:00Z).
          Applies to all streams. If omitted, defaults to 1970-01-01 (epoch).
        order: 2
        pattern: "^[0-9]{4}-[0-9]{2}-[0-9]{2}T[0-9]{2}:[0-9]{2}:[0-9]{2}Z$"
        examples:
          - "2025-01-01T00:00:00Z"
    additionalProperties: true

metadata:
  autoImportSchema:
    repo_details: false
    releases_details: false
    team_repositories: false

schemas:
  repo_details:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      nameWithOwner:
        type: string
      url:
        type: string
      homepageUrl:
        type:
          - string
          - "null"
      sshUrl:
        type: string
      createdAt:
        type: string
      updatedAt:
        type: string
      pushedAt:
        type:
          - string
          - "null"
      description:
        type:
          - string
          - "null"
      isPrivate:
        type: boolean
      isFork:
        type: boolean
      isArchived:
        type: boolean
      primaryLanguage:
        type:
          - object
          - "null"
        properties:
          name:
            type: string
      latestRelease:
        type:
          - object
          - "null"
        properties:
          name:
            type:
              - string
              - "null"
          tagName:
            type:
              - string
              - "null"
          publishedAt:
            type:
              - string
              - "null"
      readme:
        type:
          - object
          - "null"
        properties:
          text:
            type:
              - string
              - "null"
          byteSize:
            type:
              - integer
              - "null"
          isBinary:
            type:
              - boolean
              - "null"
      codeowners:
        type:
          - object
          - "null"
        properties:
          text:
            type:
              - string
              - "null"
          byteSize:
            type:
              - integer
              - "null"
          isBinary:
            type:
              - boolean
              - "null"
      languages:
        type: array
        items:
          type: object
          properties:
            name:
              type: string
            size:
              type: integer

  releases_details:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      releases:
        type: array
        items:
          type: object
          properties:
            name:
              type:
                - string
                - "null"
            tagName:
              type: string
            isPrerelease:
              type:
                - boolean
                - "null"
            isDraft:
              type:
                - boolean
                - "null"
            publishedAt:
              type:
                - string
                - "null"
            description:
              type:
                - string
                - "null"
            url:
              type: string

  team_repositories:
    type: object
    $schema: http://json-schema.org/draft-07/schema#
    additionalProperties: true
    properties:
      id:
        type: string
      name:
        type: string
      slug:
        type: string
      combinedSlug:
        type:
          - string
          - "null"
      description:
        type:
          - string
          - "null"
      createdAt:
        type:
          - string
          - "null"
      updatedAt:
        type:
          - string
          - "null"
      avatarUrl:
        type:
          - string
          - "null"
      privacy:
        type:
          - string
          - "null"
      notificationSetting:
        type:
          - string
          - "null"
      url:
        type:
          - string
          - "null"
      membersUrl:
        type:
          - string
          - "null"
      reviewRequestDelegationEnabled:
        type:
          - boolean
          - "null"
      reviewRequestDelegationAlgorithm:
        type:
          - string
          - "null"
      reviewRequestDelegationMemberCount:
        type:
          - integer
          - "null"
      reviewRequestDelegationNotifyTeam:
        type:
          - boolean
          - "null"
      viewerCanAdminister:
        type:
          - boolean
          - "null"
      repositories:
        type: array
        items:
          type: object
          properties:
            permission:
              type: string
            name:
              type: string
            url:
              type: string
            isPrivate:
              type: boolean
